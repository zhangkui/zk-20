version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: zk-20-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: zk-20-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:/app/data/zk-20.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_CLIENT_ID=zk-20-backend-docker
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: zk-20-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
